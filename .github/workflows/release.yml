name: release

# On a version tag: build cross-OS binaries (attached to the GitHub Release) and
# publish a multi-arch image to GHCR.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Build + archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          name="myscrape-${GOOS}-${GOARCH}"
          ext=""; [ "$GOOS" = windows ] && ext=".exe"
          go build -trimpath -ldflags="-s -w" -o "myscrape${ext}" ./cmd/myscrape
          if [ "$GOOS" = windows ]; then
            zip "${name}.zip" "myscrape${ext}"
          else
            tar czf "${name}.tar.gz" "myscrape${ext}"
          fi
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tar.gz
            *.zip

  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
